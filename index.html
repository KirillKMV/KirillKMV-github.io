<title>Готовим вместе — Рецепты</title>

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f9f3eb;
  --card: #fff;
  --terra: #c05a3c;
  --terra2: #e07a58;
  --brown: #3e2110;
  --sage: #7a9a6e;
  --gold: #c8973c;
  --muted: #9a7e6a;
  --line: rgba(192,90,60,0.12);
}

body {
  background: var(--bg);
  font-family: 'DM Sans', sans-serif;
  color: var(--brown);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ─── HEADER ─── */
.header {
  background: var(--brown);
  padding: 28px 20px 22px;
  text-align: center;
  position: relative;
}
.header-label {
  font-size: 10px;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.4);
  margin-bottom: 6px;
}
.header-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(28px, 7vw, 42px);
  font-weight: 600;
  color: #fff;
  line-height: 1.1;
}
.header-title em {
  font-style: italic;
  color: #e8b07a;
}
.header-sub {
  margin-top: 6px;
  font-size: 12px;
  font-weight: 300;
  color: rgba(255,255,255,0.5);
}

/* ─── NAV PILLS ─── */
.nav-wrap {
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
  background: var(--brown);
  padding: 0 12px 16px;
}
.nav-wrap::-webkit-scrollbar { display: none; }
.nav {
  display: flex;
  gap: 8px;
  width: max-content;
  margin: 0 auto;
}
.nav-btn {
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 30px;
  padding: 7px 14px;
  color: rgba(255,255,255,0.55);
  font-family: 'DM Sans', sans-serif;
  font-size: 12px;
  font-weight: 400;
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 5px;
}
.nav-btn:hover { background: rgba(255,255,255,0.14); color: rgba(255,255,255,0.8); }
.nav-btn.active {
  background: var(--terra);
  border-color: var(--terra);
  color: #fff;
}
.nav-btn .n {
  font-family: 'Cormorant Garamond', serif;
  font-size: 14px;
  font-weight: 600;
  opacity: 0.6;
}
.nav-btn.active .n { opacity: 1; }

/* ─── RECIPE PAGE ─── */
.page {
  display: none;
  padding: 24px 16px 60px;
  max-width: 680px;
  margin: 0 auto;
  animation: fadeIn 0.35s ease;
}
.page.active { display: block; }

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* Hero block */
.recipe-hero {
  border-radius: 24px;
  padding: 28px 24px 24px;
  margin-bottom: 20px;
  position: relative;
  overflow: hidden;
}
.recipe-hero::before {
  content: '';
  position: absolute;
  inset: 0;
  opacity: 0.07;
  background: repeating-linear-gradient(
    45deg,
    transparent,
    transparent 10px,
    rgba(255,255,255,0.5) 10px,
    rgba(255,255,255,0.5) 11px
  );
}
.recipe-emoji-big {
  font-size: 52px;
  line-height: 1;
  display: block;
  margin-bottom: 12px;
  filter: drop-shadow(0 4px 8px rgba(0,0,0,0.15));
}
.recipe-num {
  font-family: 'Cormorant Garamond', serif;
  font-size: 13px;
  font-weight: 400;
  color: rgba(255,255,255,0.55);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 4px;
}
.recipe-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(28px, 7vw, 38px);
  font-weight: 700;
  color: #fff;
  line-height: 1.1;
}
.recipe-tagline {
  margin-top: 8px;
  font-size: 13px;
  font-weight: 300;
  color: rgba(255,255,255,0.65);
  line-height: 1.5;
}

/* Meta pills */
.meta {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 14px;
}
.meta-pill {
  background: rgba(255,255,255,0.15);
  border-radius: 20px;
  padding: 4px 12px;
  font-size: 11px;
  font-weight: 500;
  color: rgba(255,255,255,0.85);
  display: flex;
  align-items: center;
  gap: 4px;
}

/* Sections */
.section {
  background: var(--card);
  border-radius: 18px;
  padding: 20px 20px;
  margin-bottom: 14px;
  border: 1px solid var(--line);
}
.section-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 20px;
  font-weight: 600;
  color: var(--terra);
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 8px;
}

/* Ingredients */
.ingredients {
  display: flex;
  flex-direction: column;
  gap: 0;
}
.ing {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  padding: 9px 0;
  border-bottom: 1px dashed rgba(192,90,60,0.1);
  font-size: 14px;
}
.ing:last-child { border-bottom: none; }
.ing-name { font-weight: 400; color: var(--brown); }
.ing-qty { font-weight: 500; color: var(--terra); font-size: 13px; text-align: right; flex-shrink: 0; margin-left: 12px; }

/* Steps */
.steps { display: flex; flex-direction: column; gap: 14px; }
.step {
  display: grid;
  grid-template-columns: 32px 1fr;
  gap: 12px;
  align-items: start;
}
.step-num {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: var(--terra);
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Cormorant Garamond', serif;
  font-size: 16px;
  font-weight: 700;
  flex-shrink: 0;
  margin-top: 1px;
}
.step-text {
  font-size: 14px;
  font-weight: 300;
  line-height: 1.65;
  color: #4a3020;
  padding-top: 6px;
}
.step-text strong { font-weight: 500; color: var(--brown); }

/* Tip box */
.tip {
  background: linear-gradient(135deg, #fff8ee, #fdf3e3);
  border-radius: 14px;
  padding: 14px 16px;
  border-left: 3px solid var(--gold);
  font-size: 13px;
  font-weight: 300;
  color: #6a4e28;
  line-height: 1.6;
  margin-bottom: 14px;
}
.tip strong { font-weight: 500; color: var(--gold); }

/* Nav buttons bottom */
.bottom-nav {
  display: flex;
  justify-content: space-between;
  gap: 12px;
  margin-top: 24px;
}
.btn-nav {
  flex: 1;
  padding: 13px 16px;
  border-radius: 14px;
  border: none;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
}
.btn-prev { background: #ece3d8; color: var(--muted); }
.btn-next { background: var(--terra); color: #fff; }
.btn-prev:hover { background: #e0d4c4; }
.btn-next:hover { background: #b04e32; }
.btn-prev:disabled, .btn-next:disabled { opacity: 0.3; cursor: default; }

/* Hero colors per recipe */
.h1 { background: linear-gradient(135deg, #8b3a20, #c05a3c); }
.h2 { background: linear-gradient(135deg, #4a7a3e, #7aaa5e); }
.h3 { background: linear-gradient(135deg, #a07030, #d4a050); }
.h4 { background: linear-gradient(135deg, #7a3a20, #c06040); }
.h5 { background: linear-gradient(135deg, #304a7a, #5a7ab0); }
.h6 { background: linear-gradient(135deg, #5a3a7a, #9a6ab0); }
.h7 { background: linear-gradient(135deg, #8b2a20, #c04030); }
.h8 { background: linear-gradient(135deg, #7a5a20, #c09030); }
.h9 { background: linear-gradient(135deg, #3a2010, #7a4020); }
.h10 { background: linear-gradient(135deg, #6a3a4a, #b07080); }
</style>
</head>

const navEl = document.getElementById('nav');
const pagesEl = document.getElementById('pages');

recipes.forEach((r, i) => {
  // Nav button
  const btn = document.createElement('button');
  btn.className = 'nav-btn' + (i === 0 ? ' active' : '');
  btn.innerHTML = `<span class="n">${i+1}</span>${r.emoji}`;
  btn.onclick = () => showPage(i);
  navEl.appendChild(btn);

  // Page
  const page = document.createElement('div');
  page.className = 'page' + (i === 0 ? ' active' : '');
  page.id = `page-${i}`;

  const ingsHTML = r.ingredients.map(ing =>
    `<div class="ing"><span class="ing-name">${ing.name}</span><span class="ing-qty">${ing.qty}</span></div>`
  ).join('');

  const stepsHTML = r.steps.map((s, si) =>
    `<div class="step"><div class="step-num">${si+1}</div><div class="step-text">${s}</div></div>`
  ).join('');

  page.innerHTML = `
    <div class="recipe-hero ${r.hClass}">
      <span class="recipe-emoji-big">${r.emoji}</span>
      <div class="recipe-num">Рецепт ${i+1} из ${recipes.length}</div>
      <div class="recipe-name">${r.name}</div>
      <div class="recipe-tagline">${r.tagline}</div>
      <div class="meta">
        <span class="meta-pill">⏱ ${r.time}</span>
        <span class="meta-pill">💰 ${r.cost}</span>
        <span class="meta-pill">🍽 ${r.servings}</span>
        <span class="meta-pill">⭐ ${r.difficulty}</span>
      </div>
    </div>

    <div class="section">
      <div class="section-title">🛒 Ингредиенты</div>
      <div class="ingredients">${ingsHTML}</div>
    </div>

    <div class="tip">${r.tip}</div>

    <div class="section">
      <div class="section-title">👨‍🍳 Приготовление</div>
      <div class="steps">${stepsHTML}</div>
    </div>

    <div class="bottom-nav">
      <button class="btn-nav btn-prev" onclick="showPage(${i-1})" ${i===0?'disabled':''}>← Назад</button>
      <button class="btn-nav btn-next" onclick="showPage(${i+1})" ${i===recipes.length-1?'disabled':''}>Вперёд →</button>
    </div>
  `;

  pagesEl.appendChild(page);
});

function showPage(idx) {
  if (idx < 0 || idx >= recipes.length) return;
  document.querySelectorAll('.page').forEach((p,i) => p.classList.toggle('active', i===idx));
  document.querySelectorAll('.nav-btn').forEach((b,i) => b.classList.toggle('active', i===idx));
  // Scroll nav btn into view
  navEl.querySelectorAll('.nav-btn')[idx].scrollIntoView({behavior:'smooth', block:'nearest', inline:'center'});
  window.scrollTo({top:0, behavior:'smooth'});
}
